# sql/entity_configs/entities.yaml
# Canonical entity configuration — shared contract (WP-SQL / all teams).
# Secrets are NEVER stored here. All secret refs use Azure Key Vault pattern:
#   ${KEYVAULT:wealth-<entity>-<secret-name>}

entities:
  SG:
    entity_id: SG
    currency: SGD
    locales: [en_SG]
    languages: [en]
    data_region: ap-southeast-1
    vault_uri: https://wealth-sg.vault.azure.net/
    fee_bps: 50
    minimum_aum: 0
    suitability_framework: MAS_FAA_2002
    regulators: [MAS]
    disclosure_locale: en_SG
    cross_border_restrictions_enabled: false
    data_residency_strict: true
    audit_log_destination: ${KEYVAULT:wealth-sg-audit-log-destination}
    kv_db_secret_name: ${KEYVAULT:wealth-sg-db-connection-string}
    kv_jwt_secret_name: ${KEYVAULT:wealth-sg-jwt-secret}
    kv_encryption_key_name: ${KEYVAULT:wealth-sg-encryption-key}
    booking_centre: Singapore
    large_position_threshold: 250000
    kms_vault_name: wealth-sg

  HK:
    entity_id: HK
    currency: HKD
    locales: [en_HK]
    languages: [en]
    data_region: ap-east-1
    vault_uri: https://wealth-hk.vault.azure.net/
    fee_bps: 60
    minimum_aum: 0
    suitability_framework: SFC_COP_2019
    regulators: [SFC]
    disclosure_locale: en_HK
    cross_border_restrictions_enabled: true
    data_residency_strict: true
    audit_log_destination: ${KEYVAULT:wealth-hk-audit-log-destination}
    kv_db_secret_name: ${KEYVAULT:wealth-hk-db-connection-string}
    kv_jwt_secret_name: ${KEYVAULT:wealth-hk-jwt-secret}
    kv_encryption_key_name: ${KEYVAULT:wealth-hk-encryption-key}
    booking_centre: Hong Kong
    large_position_threshold: 1000000
    kms_vault_name: wealth-hk

  CH:
    entity_id: CH
    currency: CHF
    locales: [de_CH]
    languages: [de]
    data_region: eu-west-1
    vault_uri: https://wealth-ch.vault.azure.net/
    fee_bps: 80
    minimum_aum: 0
    suitability_framework: FINMA_LSFin_2020
    regulators: [FINMA]
    disclosure_locale: de_CH
    cross_border_restrictions_enabled: true
    data_residency_strict: true
    audit_log_destination: ${KEYVAULT:wealth-ch-audit-log-destination}
    kv_db_secret_name: ${KEYVAULT:wealth-ch-db-connection-string}
    kv_jwt_secret_name: ${KEYVAULT:wealth-ch-jwt-secret}
    kv_encryption_key_name: ${KEYVAULT:wealth-ch-encryption-key}
    booking_centre: Zurich
    large_position_threshold: 5000000
    kms_vault_name: wealth-ch